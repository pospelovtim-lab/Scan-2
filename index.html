<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Макет: сканирование артикулов</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f4f4f5; --surface:#ffffff; --border:#e4e4e7; --text:#18181b; --muted:#71717a;
    --primary:#18181b; --on-primary:#ffffff;
    --success-bg:#dcfce7; --success-text:#15803d;
    --danger-bg:#fee2e2; --danger-text:#b91c1c;
    --warning-bg:#fef3c7; --warning-text:#b45309;
  }
  *{box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); margin:0; color:var(--text);
    min-height:100vh;
  }
  .phone{max-width:380px;margin:0 auto;padding:24px 12px 0;min-height:100vh;position:relative;box-sizing:border-box;}
  .content{padding-bottom:150px;}
  button{font-family:inherit;cursor:pointer;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);}
  input{font-family:inherit;}
  .btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--primary);color:var(--on-primary);border:none;height:48px;border-radius:10px;font-size:15px;font-weight:600;flex:1;}
  .btn-icon{width:48px;height:48px;flex-shrink:0;font-size:18px;display:flex;align-items:center;justify-content:center;}
  .manual-row{display:flex;gap:8px;margin-bottom:8px;}
  .manual-row input{flex:1;height:48px;padding:0 12px;font-size:13px;border-radius:10px;border:1px solid var(--border);background:var(--surface);}
  .manual-row button{width:48px;height:48px;flex-shrink:0;font-size:18px;}
  .scan-row{display:flex;gap:8px;}
  .bottom-bar{
    position:fixed; left:0; right:0; bottom:0;
    max-width:380px; margin:0 auto;
    padding:10px 12px calc(14px + env(safe-area-inset-bottom));
    background:var(--bg);
    border-top:1px solid var(--border);
  }
  .empty{text-align:center;padding:2.2rem 1rem;color:var(--muted);font-size:13px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .card .art{font-weight:600;font-size:14px;}
  .badges{display:flex;gap:6px;flex-shrink:0;}
  .badge{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:8px;font-size:11.5px;font-weight:600;white-space:nowrap;}
  .badge.ok{background:var(--success-bg);color:var(--success-text);}
  .badge.no{background:var(--danger-bg);color:var(--danger-text);}
  .badge.warn{background:var(--warning-bg);color:var(--warning-text);}

  .camera-screen{display:none;}
  .viewport{position:relative;background:#0a0a0a;border-radius:20px;overflow:hidden;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
  .viewport::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 3px);z-index:1;pointer-events:none;}
  .cam-topbar{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center;z-index:2;}
  .close-btn{width:38px;height:38px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .hint{color:#fff;font-size:12px;background:rgba(255,255,255,0.15);padding:6px 12px;border-radius:20px;backdrop-filter:blur(4px);}
  .frame{width:72%;aspect-ratio:1;position:relative;z-index:2;}
  .corner{position:absolute;width:26px;height:26px;border-color:#fff;}
  .corner.tl{top:0;left:0;border-top:4px solid #fff;border-left:4px solid #fff;border-radius:14px 0 0 0;}
  .corner.tr{top:0;right:0;border-top:4px solid #fff;border-right:4px solid #fff;border-radius:0 14px 0 0;}
  .corner.bl{bottom:0;left:0;border-bottom:4px solid #fff;border-left:4px solid #fff;border-radius:0 0 0 14px;}
  .corner.br{bottom:0;right:0;border-bottom:4px solid #fff;border-right:4px solid #fff;border-radius:0 0 14px 0;}
  .scanline{position:absolute;left:4%;right:4%;height:2px;background:linear-gradient(90deg, transparent, #4ade80, transparent);animation:scan 2.2s ease-in-out infinite;}
  @keyframes scan{0%{top:6%;}50%{top:92%;}100%{top:6%;}}

  .confirm-card{display:none;margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
  .confirm-card .label{font-size:12px;color:var(--muted);margin:0 0 2px;}
  .confirm-card .value{font-size:19px;font-weight:700;margin:0 0 12px;letter-spacing:0.3px;}
  .confirm-actions{display:flex;gap:8px;}
  .confirm-actions button{flex:1;height:40px;font-size:13px;font-weight:600;}
  .confirm-actions .accept{background:var(--primary);color:var(--on-primary);border:none;}

  .toast{display:none;margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;align-items:center;gap:10px;}
  .toast .ic{width:36px;height:36px;border-radius:50%;background:var(--success-bg);color:var(--success-text);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .toast p{margin:0;}
  .toast .t1{font-size:12px;color:var(--muted);}
  .toast .t2{font-size:15px;font-weight:700;}

  .sim-btn{width:100%;margin-top:14px;height:40px;font-size:12.5px;color:var(--muted);}
  .section-note{font-size:11px;color:var(--muted);text-align:center;margin-top:18px;}
  .ocr-status{text-align:center;font-size:12px;color:var(--muted);margin-top:10px;min-height:16px;}
  .cam-error{display:none;margin-top:14px;background:var(--danger-bg);color:var(--danger-text);border-radius:12px;padding:12px 14px;font-size:13px;text-align:center;}
</style>
</head>
<body>
<div class="phone">

  <!-- ЭКРАН СПИСКА -->
  <div id="listScreen">
    <div class="content">
      <div id="empty" class="empty">Список пуст — нажмите «Сканировать»</div>
      <div id="list"></div>
    </div>

    <div class="bottom-bar">
      <div class="manual-row">
        <input id="manualInput" type="text" placeholder="Ввести артикул вручную, напр. BF12345678_50">
        <button id="manualAdd">＋</button>
      </div>
      <div class="scan-row">
        <button class="btn-icon" id="clearBtn" title="Очистить историю">🗑</button>
        <button class="btn-primary" id="openCamera">📷 Сканировать</button>
      </div>
    </div>
  </div>

  <!-- ЭКРАН КАМЕРЫ -->
  <div class="camera-screen" id="cameraScreen">
    <div class="viewport">
      <video id="video" autoplay playsinline muted></video>
      <div class="cam-topbar">
        <button class="close-btn" id="closeCamera">✕</button>
        <span class="hint">Наведите на артикул</span>
      </div>
      <div class="frame">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="scanline" id="scanline"></div>
      </div>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>

    <p class="ocr-status" id="ocrStatus">Наводим камеру и держим ровно…</p>
    <div class="cam-error" id="camError"></div>

    <!-- Всплывающее подтверждение -->
    <div class="confirm-card" id="confirmCard">
      <p class="label">Распознано</p>
      <p class="value" id="confirmValue">BF12345678_50</p>
      <div class="badges" id="confirmBadges" style="margin-bottom:12px;"></div>
      <div class="confirm-actions">
        <button id="rejectBtn">Отменить</button>
        <button class="accept" id="acceptBtn">Подтвердить</button>
      </div>
    </div>

    <div class="toast" id="scanToast">
      <div class="ic">✓</div>
      <div>
        <p class="t1">Добавлено в список</p>
        <p class="t2" id="scanToastText"></p>
      </div>
    </div>

    <button class="sim-btn" id="simulateScan">Симулировать распознавание (если камера недоступна)</button>
  </div>

  <p class="section-note">Данные из Nextcloud подгружаются автоматически</p>
</div>

<script>
// Ссылка на публичную таблицу Nextcloud
// Вставьте сюда ID вашего файла из ссылки Google Диска
const FILE_ID = '19OphkawbvP9szdu3qYnAC_zs9O7aU1sp'; 

// Прямая ссылка на скачивание файла из Google Drive
const TABLE_URL = https://docs.google.com/spreadsheets/d/${FILE_ID}/export?format=xlsx;
const CACHE_MS = 30 * 60 * 1000;

let tableCache = null;
let tableCacheTime = 0;

async function fetchTable(){
  try {
    const resp = await fetch(TABLE_URL);
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    const data = [];
    for(let i = 1; i < rows.length; i++){
      const r = rows[i];
      if(!r || !r[0]) continue;
      
      const key = String(r[0]).trim().toUpperCase();
      const flatlay = String(r[1] || '').trim() === '+';
      const model = String(r[2] || '').trim() === '+';
      
      data.push({ key, flatlay, model });
    }

    console.log('Успешно загружено из Google Диска. Записей:', data.length);
    tableCache = data;
    tableCacheTime = Date.now();
    return data;
  } catch(err) {
    console.error('Ошибка загрузки из Google Drive:', err);
    return [];
  }
}

async function getTableData(){
  const isStale = !tableCache || (Date.now() - tableCacheTime) > CACHE_MS;
  if(isStale){
    await fetchTable();
  }
  return tableCache || [];
}

const HISTORY_LIMIT = 50;
let items = [];
let counter = 0;
let pendingItem = null;

function badge(label, state){
  if(state===true) return `<div class="badge ok">✓ ${label}</div>`;
  if(state===false) return `<div class="badge no">✕ ${label}</div>`;
  if(state==='error') return `<div class="badge warn">! ${label}: ошибка</div>`;
  return `<div class="badge warn">! ${label}: не найдено</div>`;
}

async function lookup(key){
  try{
    const data = await getTableData();
    const found = data.find(d => d.key === key);
    return found || { key, flatlay: null, model: null };
  }catch(err){
    return { key, flatlay: 'error', model: 'error' };
  }
}

function addItem(found){
  items.unshift({id:'i'+(counter++), key: found.key, flatlay: found.flatlay, model: found.model});
  if(items.length>HISTORY_LIMIT) items.pop();
}

function renderList(){
  document.getElementById('empty').style.display = items.length ? 'none' : 'block';
  document.getElementById('list').innerHTML = items.map(item => `
    <div class="card">
      <span class="art">${item.key}</span>
      <div class="badges">${badge('Вешалка', item.flatlay)}${badge('Модель', item.model)}</div>
    </div>
  `).join('');
}

// Первоначальная загрузка
fetchTable();

// ===== РАЗБОР ТЕКСТА OCR =====
function parseOcrText(rawText){
  const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  for(let i = 0; i < lines.length; i++){
    const articulMatch = lines[i].match(/BF\s*([0-9]{3,})/i);
    if(!articulMatch) continue;

    const articul = 'BF' + articulMatch[1];

    for(let j = i + 1; j <= i + 2 && j < lines.length; j++){
      const colorMatch = lines[j].match(/(\d+)/);
      if(colorMatch){
        return { articul, color: colorMatch[1], key: `${articul}_${colorMatch[1]}` };
      }
    }
    return { articul, color: null, key: null };
  }
  return null;
}

// ===== КАМЕРА И OCR =====
let stream = null;
let ocrTimer = null;
let ocrBusy = false;
let worker = null; 
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ocrStatus = document.getElementById('ocrStatus');
const camError = document.getElementById('camError');

async function getWorker(){
  if(worker) return worker;
  ocrStatus.textContent = 'Загружаем модуль распознавания…';
  worker = await Tesseract.createWorker('eng');
  await worker.setParameters({
    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789: '
  });
  return worker;
}

async function startCamera(){
  camError.style.display = 'none';
  camError.textContent = '';
  ocrStatus.textContent = 'Запрашиваем доступ к камере…';
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1280 } }
    });
    video.srcObject = stream;
    await video.play();
    await getWorker();
    ocrStatus.textContent = 'Наводим камеру и держим ровно…';
    startOcrLoop();
  }catch(err){
    ocrStatus.textContent = '';
    camError.style.display = 'block';
    if(err.name === 'NotAllowedError'){
      camError.textContent = 'Доступ к камере запрещён. Разрешите доступ в настройках браузера.';
    } else if(err.name === 'NotFoundError'){
      camError.textContent = 'Камера не найдена на этом устройстве.';
    } else {
      camError.textContent = 'Ошибка доступа к камере: ' + err.message;
    }
  }
}

function stopCamera(){
  if(ocrTimer){ clearInterval(ocrTimer); ocrTimer = null; }
  if(stream){
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

function startOcrLoop(){
  if(ocrTimer) clearInterval(ocrTimer);
  ocrTimer = setInterval(runOcrPass, 500);
}

async function runOcrPass(){
  if(ocrBusy || document.getElementById('confirmCard').style.display === 'block') return;
  if(!video.videoWidth) return;

  ocrBusy = true;
  ocrStatus.textContent = 'Распознаём…';

  try{
    const vw = video.videoWidth, vh = video.videoHeight;
    const side = Math.min(vw, vh) * 0.72;
    const sx = (vw - side) / 2;
    const sy = (vh - side) / 2;

    canvas.width = side;
    canvas.height = side;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, sx, sy, side, side, 0, 0, side, side);

    const w = await getWorker();
    const { data } = await w.recognize(canvas);

    const parsed = parseOcrText(data.text || '');

    if(parsed && parsed.key){
      await showConfirm(parsed);
      ocrStatus.textContent = 'Распознано';
    } else if(parsed && parsed.articul){
      ocrStatus.textContent = `Вижу артикул ${parsed.articul}, ищу цвет…`;
    } else {
      ocrStatus.textContent = 'Наводим камеру и держим ровно…';
    }
  }catch(err){
    ocrStatus.textContent = 'Ошибка распознавания…';
  }finally{
    ocrBusy = false;
  }
}

async function showConfirm(parsed){
  pendingItem = await lookup(parsed.key);
  document.getElementById('confirmValue').textContent = pendingItem.key;
  document.getElementById('confirmBadges').innerHTML = badge('Вешалка', pendingItem.flatlay) + badge('Модель', pendingItem.model);
  document.getElementById('confirmCard').style.display = 'block';
  document.getElementById('scanToast').style.display = 'none';
}

// ===== ОБРАБОТКА НАЖАТИЙ КНОПОК =====
document.getElementById('openCamera').onclick = () => {
  document.getElementById('listScreen').style.display = 'none';
  document.getElementById('cameraScreen').style.display = 'block';
  document.getElementById('confirmCard').style.display = 'none';
  document.getElementById('scanToast').style.display = 'none';
  startCamera();
};

document.getElementById('closeCamera').onclick = () => {
  stopCamera();
  document.getElementById('cameraScreen').style.display = 'none';
  document.getElementById('listScreen').style.display = 'block';
  renderList();
};

document.getElementById('simulateScan').onclick = async () => {
  if(!tableCache || tableCache.length === 0){
    await showConfirm({ key: 'BF00000000_00' });
    return;
  }
  const d = tableCache[Math.floor(Math.random()*tableCache.length)];
  await showConfirm({ key: d.key });
};

document.getElementById('acceptBtn').onclick = () => {
  if(!pendingItem) return;
  addItem(pendingItem);
  document.getElementById('confirmCard').style.display = 'none';
  const toast = document.getElementById('scanToast');
  toast.style.display = 'flex';
  document.getElementById('scanToastText').textContent = pendingItem.key;
  pendingItem = null;
  clearTimeout(window._t);
  window._t = setTimeout(()=>{ toast.style.display='none'; }, 1600);
};

document.getElementById('rejectBtn').onclick = () => {
  pendingItem = null;
  document.getElementById('confirmCard').style.display = 'none';
};

document.getElementById('manualAdd').onclick = async () => {
  const val = document.getElementById('manualInput').value.trim();
  if(!val) return;
  const found = await lookup(val.toUpperCase());
  addItem(found);
  document.getElementById('manualInput').value = '';
  renderList();
};

document.getElementById('clearBtn').onclick = () => { items = []; renderList(); };

renderList();
</script>
</body>
</html>
